services:
  postgres:
    image: postgres:17
    container_name: replyiq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: replyiq
      POSTGRES_USER: replyiq
      POSTGRES_PASSWORD: replyiq_dev_password
    volumes:
      - replyiq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replyiq -d replyiq"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  replyiq-postgres-data:
